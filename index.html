<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسب الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        input, select, button { flex: 1; min-width: 150px; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; }
        button { background-color: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        .btn-compare { background-color: #3498db; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; min-width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .status-paid { background-color: #d4edda; color: #155724; font-weight: bold; }
        .status-later { background-color: #fff3cd; color: #856404; font-weight: bold; }
        .status-unpaid { background-color: #f8d7da; color: #721c24; font-weight: bold; }
        .extra-box { background: #e8f4fd; padding: 15px; border-right: 5px solid #3498db; margin-top: 20px; border-radius: 5px; }
        @media (max-width: 600px) { .form-group { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 نظام إدارة المبيعات والتحصيلات</h2>
    
    <div class="form-group">
        <input type="text" id="custName" placeholder="اسم الزبون">
        <input type="text" id="custPhone" placeholder="رقم الجوال">
        <input type="number" id="amount" placeholder="المبلغ">
        <select id="initialStatus">
            <option value="تم التحويل">تم التحويل</option>
            <option value="سيحول لاحقاً">سيحول لاحقاً</option>
        </select>
        <button onclick="saveRecord()">💾 حفظ العملية</button>
    </div>

    <div class="form-group" style="background: #eef2f7;">
        <label style="width: 100%;">📤 رفع كشف البنك (إكسل) للمقارنة:</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <button class="btn-compare" onclick="processComparison()">🔍 بدء المطابقة</button>
    </div>

    <div id="extraSection" class="extra-box" style="display:none;">
        <strong>⚠️ حوالات في الكشف غير مسجلة بالجدول (أسماء زائدة):</strong>
        <ul id="extraList"></ul>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>التاريخ والوقت</th>
                <th>الاسم</th>
                <th>الجوال</th>
                <th>المبلغ</th>
                <th>الحالة</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    
    <button style="background:#95a5a6; margin-top:30px;" onclick="clearDatabase()">🗑️ مسح كافة البيانات</button>
</div>

<script>
    // حفظ سجل جديد
    function saveRecord() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const status = document.getElementById('initialStatus').value;
        const timestamp = new Date().toLocaleString('ar-EG'); // تسجيل الوقت تلقائياً

        if(!name || !amount) { alert("يرجى إدخال الاسم والمبلغ على الأقل"); return; }

        let records = JSON.parse(localStorage.getItem('traderData') || "[]");
        records.push({ timestamp, name, phone, amount, status });
        localStorage.setItem('traderData', JSON.stringify(records));
        
        // تفريغ الخانات
        document.getElementById('custName').value = "";
        document.getElementById('custPhone').value = "";
        document.getElementById('amount').value = "";
        
        renderUI();
    }

    // عرض البيانات
    function renderUI() {
        const records = JSON.parse(localStorage.getItem('traderData') || "[]");
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        records.forEach((rec, index) => {
            let statusClass = "status-unpaid";
            if(rec.status.includes("تم التحويل")) statusClass = "status-paid";
            if(rec.status === "سيحول لاحقاً") statusClass = "status-later";

            tbody.innerHTML += `<tr>
                <td>${rec.timestamp}</td>
                <td>${rec.name}</td>
                <td>${rec.phone}</td>
                <td>${rec.amount}</td>
                <td class="${statusClass}">${rec.status}</td>
                <td><button class="btn-delete" onclick="deleteLine(${index})">حذف</button></td>
            </tr>`;
        });
    }

    // المقارنة مع الإكسل
    function processComparison() {
        const file = document.getElementById('excelFile').files[0];
        if (!file) { alert("يرجى اختيار ملف الإكسل"); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const bankRows = XLSX.utils.sheet_to_json(sheet);

            let bankContentStrings = bankRows.map(row => Object.values(row).join(" ").toLowerCase());
            let myRecords = JSON.parse(localStorage.getItem('traderData') || "[]");
            let matchedBankIndices = new Set();

            myRecords.forEach(rec => {
                let foundIndex = bankContentStrings.findIndex(rowStr => 
                    (rec.name && rowStr.includes(rec.name.toLowerCase())) || 
                    (rec.phone && rowStr.includes(rec.phone))
                );

                if (foundIndex !== -1) {
                    rec.status = "تم التحويل ✅ (مطابق)";
                    matchedBankIndices.add(foundIndex);
                } else {
                    if(rec.status !== "سيحول لاحقاً") rec.status = "لم يحول بعد ❌";
                }
            });

            // عرض الأسماء الزائدة
            const extraList = document.getElementById('extraList');
            extraList.innerHTML = "";
            let hasExtras = false;
            bankContentStrings.forEach((rowStr, idx) => {
                if (!matchedBankIndices.has(idx)) {
                    hasExtras = true;
                    let li = document.createElement('li');
                    li.textContent = rowStr;
                    extraList.appendChild(li);
                }
            });

            document.getElementById('extraSection').style.display = hasExtras ? "block" : "none";
            localStorage.setItem('traderData', JSON.stringify(myRecords));
            renderUI();
            alert("اكتملت المقارنة وتحديث الحالات!");
        };
        reader.readAsArrayBuffer(file);
    }

    function deleteLine(index) {
        let records = JSON.parse(localStorage.getItem('traderData') || "[]");
        records.splice(index, 1);
        localStorage.setItem('traderData', JSON.stringify(records));
        renderUI();
    }

    function clearDatabase() {
        if(confirm("سيتم حذف كل السجلات، هل أنت متأكد؟")) {
            localStorage.removeItem('traderData');
            renderUI();
        }
    }

    renderUI(); // تشغيل عند الفتح
</script>

</body>
</html>
