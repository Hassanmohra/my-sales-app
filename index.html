<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاسب الذكي - واجهة احترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #ff9f1c;
            --bg: #f8f9fc;
            --text: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: none;
        }

        h3 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input, select {
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1); }

        button {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-save:hover { background: var(--secondary); transform: translateY(-2px); }

        .btn-compare { background: #4cc9f0; color: white; }
        .file-upload {
            border: 2px dashed #cbd5e0;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; }
        th { padding: 15px; color: #718096; font-weight: 600; text-align: center; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; background: white; text-align: center; border-top: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; }
        td:first-child { border-right: 1px solid #edf2f7; border-radius: 0 12px 12px 0; }
        td:last-child { border-left: 1px solid #edf2f7; border-radius: 12px 0 0 12px; }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-unpaid { background: #fee2e2; color: #991b1b; }
        .status-later { background: #fef3c7; color: #92400e; }

        .extra-section { background: #fffaf0; border: 1px solid #feebc8; border-radius: 12px; padding: 20px; margin-top: 20px; }
        
        .delete-icon { color: var(--danger); cursor: pointer; font-size: 18px; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            td, th { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-wallet"></i> مساعد التاجر الذكي</h1>
        <p>إدارة المبيعات والمطابقة البنكية بلمسة واحدة</p>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة عملية جديدة</h3>
        <div class="grid-inputs">
            <input type="text" id="custName" placeholder="اسم الزبون الكامل">
            <input type="text" id="custPhone" placeholder="رقم الجوال">
            <input type="number" id="amount" placeholder="المبلغ المطلوب">
            <select id="initialStatus">
                <option value="تم التحويل">تم التحويل ✅</option>
                <option value="سيحول لاحقاً">سيحول لاحقاً ⏳</option>
            </select>
        </div>
        <button class="btn-save" onclick="saveRecord()">
            <i class="fas fa-save"></i> حفظ البيانات في الجوال
        </button>
    </div>

    <div class="card">
        <h3><i class="fas fa-file-excel"></i> مطابقة كشف البنك</h3>
        <div class="file-upload" onclick="document.getElementById('excelFile').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 30px; color: var(--primary);"></i>
            <p>اضغط هنا لرفع ملف الإكسل (Excel)</p>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none" onchange="processComparison()">
        </div>
    </div>

    <div id="extraSection" class="extra-section" style="display:none;">
        <h4 style="color: var(--warning); margin-top: 0;"><i class="fas fa-exclamation-triangle"></i> حوالات غير مسجلة</h4>
        <ul id="extraList" style="font-size: 14px;"></ul>
    </div>

    <div style="overflow-x: auto;">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>الوقت والتاريخ</th>
                    <th>الاسم</th>
                    <th>الجوال</th>
                    <th>المبلغ</th>
                    <th>الحالة</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button style="background:#ccd6dd; color:#1a1a1a; margin-top:40px; width:100%" onclick="clearDatabase()">
        <i class="fas fa-trash-alt"></i> مسح كافة البيانات لبدء يوم جديد
    </button>
</div>

<script>
    // جميع الوظائف البرمجية (نفس منطق الكود السابق مع تحسين العرض)
    function saveRecord() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const status = document.getElementById('initialStatus').value;
        const timestamp = new Date().toLocaleString('ar-EG', {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});

        if(!name || !amount) { alert("أدخل الاسم والمبلغ!"); return; }

        let records = JSON.parse(localStorage.getItem('traderData') || "[]");
        records.unshift({ timestamp, name, phone, amount, status }); // إضافة الجديد في الأعلى
        localStorage.setItem('traderData', JSON.stringify(records));
        
        document.getElementById('custName').value = "";
        document.getElementById('custPhone').value = "";
        document.getElementById('amount').value = "";
        renderUI();
    }

    function renderUI() {
        const records = JSON.parse(localStorage.getItem('traderData') || "[]");
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        records.forEach((rec, index) => {
            let statusClass = "status-unpaid";
            if(rec.status.includes("تم التحويل")) statusClass = "status-paid";
            if(rec.status === "سيحول لاحقاً") statusClass = "status-later";

            tbody.innerHTML += `<tr>
                <td style="color: #a0aec0; font-size: 12px;">${rec.timestamp}</td>
                <td style="font-weight: 600;">${rec.name}</td>
                <td>${rec.phone}</td>
                <td style="color: var(--primary); font-weight: bold;">${rec.amount}</td>
                <td><span class="badge ${statusClass}">${rec.status}</span></td>
                <td><i class="fas fa-trash-alt delete-icon" onclick="deleteLine(${index})"></i></td>
            </tr>`;
        });
    }

    function processComparison() {
        const file = document.getElementById('excelFile').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const bankRows = XLSX.utils.sheet_to_json(sheet);

            let bankStrings = bankRows.map(row => Object.values(row).join(" ").toLowerCase());
            let myRecords = JSON.parse(localStorage.getItem('traderData') || "[]");
            let matchedIndices = new Set();

            myRecords.forEach(rec => {
                let foundIndex = bankStrings.findIndex(s => 
                    (rec.name && s.includes(rec.name.toLowerCase())) || 
                    (rec.phone && s.includes(rec.phone))
                );

                if (foundIndex !== -1) {
                    rec.status = "تم التحويل ✅";
                    matchedIndices.add(foundIndex);
                } else if(rec.status !== "سيحول لاحقاً") {
                    rec.status = "لم يحول ❌";
                }
            });

            const extraList = document.getElementById('extraList');
            extraList.innerHTML = "";
            let hasExtras = false;
            bankStrings.forEach((s, idx) => {
                if (!matchedIndices.has(idx)) {
                    hasExtras = true;
                    extraList.innerHTML += `<li>${s}</li>`;
                }
            });

            document.getElementById('extraSection').style.display = hasExtras ? "block" : "none";
            localStorage.setItem('traderData', JSON.stringify(myRecords));
            renderUI();
            alert("✨ تمت المطابقة وتحديث البيانات!");
        };
        reader.readAsArrayBuffer(file);
    }

    function deleteLine(index) {
        if(confirm("حذف هذا السجل؟")) {
            let records = JSON.parse(localStorage.getItem('traderData') || "[]");
            records.splice(index, 1);
            localStorage.setItem('traderData', JSON.stringify(records));
            renderUI();
        }
    }

    function clearDatabase() {
        if(confirm("هل تريد إفراغ كافة البيانات؟")) {
            localStorage.removeItem('traderData');
            renderUI();
        }
    }

    renderUI();
</script>

</body>
</html>
